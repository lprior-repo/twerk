                - string
                - 'null'
              createdAt:
                format: date-time
                type:
                - string
                - 'null'
              createdBy:
                oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/User'
              description:
                type:
                - string
                - 'null'
              error:
                type:
                - string
                - 'null'
              failedAt:
                format: date-time
                type:
                - string
                - 'null'
              id:
                oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/JobId'
              inputs:
                additionalProperties:
                  type: string
                propertyNames:
                  type: string
                type:
                - object
                - 'null'
              name:
                type:
                - string
                - 'null'
              parentId:
                oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/JobId'
              position:
                format: int64
                type: integer
              progress:
                format: double
                type: number
              result:
                type:
                - string
                - 'null'
              schedule:
                oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/JobSchedule'
              startedAt:
