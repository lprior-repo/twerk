name: OpenAPI Sync Check

on:
  pull_request:
    paths:
      - docs/openapi.yaml
      - docs/openapi.json
      - crates/twerk-openapi-gen/**
      - crates/twerk-web/**
      - .github/workflows/openapi-sync.yml
  push:
    branches:
      - main
    paths:
      - docs/openapi.yaml
      - docs/openapi.json
      - crates/twerk-openapi-gen/**
      - crates/twerk-web/**
      - .github/workflows/openapi-sync.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  openapi-sync:
    name: OpenAPI spec sync check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Generate tracked OpenAPI artifacts
        run: cargo run -p twerk-openapi-gen --quiet

      - name: Check tracked OpenAPI artifacts for drift
        run: |
          if ! git diff --exit-code -- docs/openapi.yaml docs/openapi.json crates/twerk-web/openapi.json; then
            echo "ERROR: tracked OpenAPI artifacts are out of sync!"
            echo "Run 'cargo run -p twerk-openapi-gen' to update docs/openapi.yaml, docs/openapi.json, and crates/twerk-web/openapi.json."
            echo ""
            echo "Diff:"
            git diff -- docs/openapi.yaml docs/openapi.json crates/twerk-web/openapi.json
            exit 1
          fi

      - name: Validate live API and documented parity
        run: cargo test -p twerk-web --test openapi_contract_test -- --nocapture
