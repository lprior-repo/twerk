name: runtime-integration

on:
  pull_request:
    paths:
      - .github/workflows/runtime-integration.yml
      - Cargo.toml
      - Cargo.lock
      - crates/twerk-core/**
      - crates/twerk-infrastructure/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/runtime-integration.yml
      - Cargo.toml
      - Cargo.lock
      - crates/twerk-core/**
      - crates/twerk-infrastructure/**
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  docker-runtime-tests:
    name: Docker runtime ignored tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify Docker daemon
        run: docker version

      - name: Run ignored Docker runtime integration tests
        run: cargo test -p twerk-infrastructure --test runtime_test docker -- --ignored --nocapture

  podman-runtime-tests:
    name: Podman runtime ignored tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Verify Podman CLI
        run: podman --version

      - name: Run ignored Podman runtime integration tests
        run: cargo test -p twerk-infrastructure --test runtime_test podman -- --ignored --nocapture
