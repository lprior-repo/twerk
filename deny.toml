[advisories]
yanked = "warn"

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "AGPL-3.0-only",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "BSL-1.0"
expression = "BSL-1.0"
license-files = [{ path = "LICENSE", hash = 0x0 }]

[[licenses.clarify]]
crate = "CDLA-Permissive-2.0"
expression = "CDLA-Permissive-2.0"
license-files = [{ path = "LICENSE", hash = 0x0 }]

[bans]
multiple-versions = "allow"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"