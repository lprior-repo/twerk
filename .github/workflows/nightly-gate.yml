name: Nightly Quality Gate

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NIGHTLY_DATE: "2026-04-27"
  ALLOWED_FEATURES: "portable_simd,try_blocks"

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-${{ env.NIGHTLY_DATE }}
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-${{ env.NIGHTLY_DATE }}
          components: clippy
      - name: Run Clippy with hard denies
        run: |
          cargo +nightly \
            -Zallow-features=${{ env.ALLOWED_FEATURES }} \
            clippy --workspace --all-targets --all-features -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::dbg_macro \
            -D clippy::todo \
            -D clippy::unimplemented

  check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-${{ env.NIGHTLY_DATE }}
      - name: Check with allowed features
        run: cargo +nightly -Zallow-features=${{ env.ALLOWED_FEATURES }} check --workspace --all-targets --all-features

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-${{ env.NIGHTLY_DATE }}
      - name: Run tests
        run: cargo test --workspace --all-features -- --test-threads=4

  miri:
    name: Miri Interpreter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-${{ env.NIGHTLY_DATE }}
          components: miri
      - name: Run Miri on pure crates
        run: cargo +nightly miri test -p twerk-core -p twerk-perf-kernels --all-features

  sanitizers:
    name: Sanitizers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-${{ env.NIGHTLY_DATE }}
      - name: Address Sanitizer
        run: |
          RUSTFLAGS="-Zsanitizer=address" cargo +nightly test \
            -Zbuild-std --target x86_64-unknown-linux-gnu \
            -p twerk-core --all-features

  hardened:
    name: Hardened Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-${{ env.NIGHTLY_DATE }}
      - name: Build hardened profile
        run: cargo build --profile hardened --workspace --all-features