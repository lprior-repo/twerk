          - type: 'null'
          - $ref: '#/components/schemas/NodeStatus'
        taskCount:
          format: int64
          type:
          - integer
          - 'null'
        version:
          type:
          - string
          - 'null'
      type: object
    NodeMetrics:
      description: '`NodeMetrics` holds metrics about twerk nodes.'
      properties:
        cpuPercent:
          format: double
          type: number
        online:
          format: int32
          type: integer
      required:
      - online
      - cpuPercent
      type: object
    NodeStatus:
      enum:
      - UP
      - DOWN
      - OFFLINE
      type: string
    Page_JobSummary:
      description: Page represents a paginated result set
      properties:
        items:
          description: Items in the current page
          items:
            description: '`JobSummary` provides a summary view of a job.'
            properties:
              completedAt:
