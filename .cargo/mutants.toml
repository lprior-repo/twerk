# cargo-mutants configuration for twerk-core
# See https://mutants.rs/ for documentation

# Run tests from this package
test_package = ["twerk-core"]

# Exclude problematic files from mutation testing
exclude_globs = [
    "**/*tests*.rs",
    "**/tests/**",
    "**/fuzz/**",
    "**/proofs/**",
    "vendor/**",
    "**/*.pb.rs",
    "**/domain_types.rs",
]

# Output directory
output = "mutants.out"

# Skip common utility functions that don't benefit from mutation testing
skip_calls = [
    "with_capacity",
    "new",
    "default",
]
