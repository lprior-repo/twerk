services:
  # PostgreSQL runs on the host (port 5432), not in Docker.
  # User/db: tork/tork created manually.

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: twerk-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 20
