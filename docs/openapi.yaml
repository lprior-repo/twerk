components:
  schemas:
    ApiError:
      oneOf:
      - properties:
          BadRequest:
            type: string
        required:
        - BadRequest
        type: object
      - properties:
          NotFound:
            type: string
        required:
        - NotFound
        type: object
      - properties:
          Internal:
            type: string
        required:
        - Internal
        type: object
    AutoDelete:
      description: '`AutoDelete` defines automatic cleanup configuration.'
      properties:
        after:
          type:
          - string
          - 'null'
      type: object
    CreateJobResponse:
      oneOf:
      - $ref: '#/components/schemas/JobSummary'
      - $ref: '#/components/schemas/Job'
    CreateScheduledJobBody:
      properties:
        auto_delete:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AutoDelete'
        cron:
          type:
          - string
          - 'null'
        defaults:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobDefaults'
        description:
          type:
          - string
          - 'null'
        inputs:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        name:
          type:
          - string
          - 'null'
        output:
          type:
          - string
          - 'null'
        permissions:
          items:
            $ref: '#/components/schemas/Permission'
          type:
          - array
          - 'null'
        secrets:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        tags:
          items:
            type: string
          type:
          - array
          - 'null'
        tasks:
          items:
            $ref: '#/components/schemas/Task'
          type:
          - array
          - 'null'
        webhooks:
          items:
            $ref: '#/components/schemas/Webhook'
          type:
          - array
          - 'null'
      type: object
    CreateUserBody:
      description: User creation body
      properties:
        password:
          type:
          - string
          - 'null'
        username:
          type:
          - string
          - 'null'
      type: object
    HealthResponse:
      properties:
        status:
          type: string
        version:
          type: string
      required:
      - status
      - version
      type: object
    Job:
      description: Job represents a job in the system.
      properties:
        autoDelete:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AutoDelete'
        completedAt:
          format: date-time
          type:
          - string
          - 'null'
        context:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobContext'
        createdAt:
          format: date-time
          type:
          - string
          - 'null'
        createdBy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/User'
        defaults:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobDefaults'
        deleteAt:
          format: date-time
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        error:
          type:
          - string
          - 'null'
        execution:
          items:
            $ref: '#/components/schemas/Task'
          type:
          - array
          - 'null'
        failedAt:
          format: date-time
          type:
          - string
          - 'null'
        id:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobId'
        inputs:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        name:
          type:
          - string
          - 'null'
        output:
          type:
          - string
          - 'null'
        parentId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobId'
        permissions:
          items:
            $ref: '#/components/schemas/Permission'
          type:
          - array
          - 'null'
        position:
          format: int64
          type: integer
        progress:
          format: double
          type: number
        result:
          type:
          - string
          - 'null'
        schedule:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobSchedule'
        secrets:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        startedAt:
          format: date-time
          type:
          - string
          - 'null'
        state:
          $ref: '#/components/schemas/JobState'
        tags:
          items:
            type: string
          type:
          - array
          - 'null'
        taskCount:
          format: int64
          type: integer
        tasks:
          items:
            $ref: '#/components/schemas/Task'
          type:
          - array
          - 'null'
        webhooks:
          items:
            $ref: '#/components/schemas/Webhook'
          type:
          - array
          - 'null'
      type: object
    JobContext:
      description: '`JobContext` holds contextual information for a job.'
      properties:
        inputs:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        job:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        secrets:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        tasks:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
      type: object
    JobDefaults:
      description: '`JobDefaults` defines default values for job tasks.'
      properties:
        limits:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TaskLimits'
        priority:
          format: int64
          type: integer
        queue:
          type:
          - string
          - 'null'
        retry:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TaskRetry'
        timeout:
          type:
          - string
          - 'null'
      type: object
    JobId:
      description: RFC 4122 UUID or 22-character base57 short job ID emitted by the coordinator
      pattern: ^(?:[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}|[23456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz]{22})$
      type: string
    JobMetrics:
      description: '`JobMetrics` holds metrics about twerk jobs.'
      properties:
        running:
          format: int32
          type: integer
      required:
      - running
      type: object
    JobSchedule:
      description: '`JobSchedule` defines a job schedule.'
      properties:
        cron:
          type:
          - string
          - 'null'
        id:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/string'
      type: object
    JobState:
      description: |-
        State machine for a [`Job`].

        Valid transitions:
        - `Pending` -> `Scheduled`
        - `Scheduled` -> `Running`
        - `Running` -> `Completed` | `Failed` | `Cancelled`
        - `Failed` | `Cancelled` -> `Restart`
        - `Restart` -> `Pending`
      enum:
      - PENDING
      - SCHEDULED
      - RUNNING
      - CANCELLED
      - COMPLETED
      - FAILED
      - RESTART
      type: string
    JobSummary:
      description: '`JobSummary` provides a summary view of a job.'
      properties:
        completedAt:
          format: date-time
          type:
          - string
          - 'null'
        createdAt:
          format: date-time
          type:
          - string
          - 'null'
        createdBy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/User'
        description:
          type:
          - string
          - 'null'
        error:
          type:
          - string
          - 'null'
        failedAt:
          format: date-time
          type:
          - string
          - 'null'
        id:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobId'
        inputs:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        name:
          type:
          - string
          - 'null'
        parentId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobId'
        position:
          format: int64
          type: integer
        progress:
          format: double
          type: number
        result:
          type:
          - string
          - 'null'
        schedule:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/JobSchedule'
        startedAt:
          format: date-time
          type:
          - string
          - 'null'
        state:
          $ref: '#/components/schemas/JobState'
        tags:
          items:
            type: string
          type:
          - array
          - 'null'
        taskCount:
          format: int64
          type: integer
      type: object
    MessageResponse:
      properties:
        message:
          type: string
      required:
      - message
      type: object
    Metrics:
      description: Metrics holds aggregated metrics across all twerk components.
      properties:
        jobs:
          $ref: '#/components/schemas/JobMetrics'
        nodes:
          $ref: '#/components/schemas/NodeMetrics'
        tasks:
          $ref: '#/components/schemas/TaskMetrics'
      required:
      - jobs
      - tasks
      - nodes
      type: object
    Mount:
      description: Mount represents a filesystem mount configuration.
      properties:
        id:
          type:
          - string
          - 'null'
        opts:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        source:
          type:
          - string
          - 'null'
        target:
          type:
          - string
          - 'null'
        type:
          type:
          - string
          - 'null'
      type: object
    Node:
      properties:
        cpuPercent:
          format: double
          type:
          - number
          - 'null'
        hostname:
          type:
          - string
          - 'null'
        id:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/string'
        lastHeartbeatAt:
          format: date-time
          type:
          - string
          - 'null'
        name:
          type:
          - string
          - 'null'
        port:
