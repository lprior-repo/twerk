services:
  postgres:
    image: postgres:16-alpine
    container_name: twerk-postgres
    environment:
      POSTGRES_USER: twerk
      POSTGRES_PASSWORD: twerk
      POSTGRES_DB: twerk
    ports:
      - "5432:5432"
    volumes:
      - twerk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twerk -d twerk"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: twerk-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  twerk-postgres-data:
