      - message
      type: object
    TriggerId:
      type: string
    TriggerUpdateRequest:
      properties:
        action:
          type: string
        condition:
          type:
          - string
          - 'null'
        enabled:
          type: boolean
        event:
          type: string
        id:
          type:
          - string
          - 'null'
        metadata:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        name:
          type: string
        version:
          format: int64
          minimum: 0
          type:
          - integer
          - 'null'
      required:
      - name
      - enabled
      - event
      - action
      type: object
    TriggerView:
      properties:
        action:
          type: string
        condition:
          type:
          - string
          - 'null'
        created_at:
          format: date-time
          type: string
        enabled:
          type: boolean
        event:
          type: string
        id:
          type: string
        metadata:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type: object
        name:
          type: string
        updated_at:
          format: date-time
          type: string
        version:
          format: int64
          minimum: 0
          type: integer
      required:
      - id
      - name
      - enabled
      - event
      - action
      - metadata
      - version
      - created_at
      - updated_at
      type: object
    User:
      properties:
        createdAt:
          format: date-time
          type:
          - string
          - 'null'
        disabled:
          type: boolean
        id:
          type: string
        name:
          type:
          - string
          - 'null'
        username:
          type:
          - string
          - 'null'
      type: object
    Webhook:
      description: Webhook defines webhook notification configuration.
      properties:
        event:
          type:
          - string
          - 'null'
        headers:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        if:
          type:
          - string
          - 'null'
        url:
          type:
          - string
          - 'null'
      type: object
    string:
      type: string
info:
  contact:
    name: Twerk Contributors
  description: ''
  license:
    identifier: Apache-2.0
    name: Apache-2.0
  title: Twerk API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/triggers:
    get:
      operationId: list_triggers_handler
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TriggerView'
                type: array
          description: List of triggers
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Persistence error
      summary: |-
        GET /api/v1/triggers
        # Errors
        This handler does not currently return `Err(ApiError)` directly; persistence and serialization
        failures are converted into HTTP responses.
      tags:
      - super::trigger_api::handlers::query
    post:
      operationId: create_trigger_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerUpdateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerView'
          description: Trigger created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Validation error
      summary: |-
        POST /api/v1/triggers
        # Errors
        This handler does not currently return `Err(ApiError)` directly; request validation, trigger
        creation, and serialization failures are converted into HTTP responses.
      tags:
      - super::trigger_api::handlers::command
  /api/v1/triggers/{id}:
    delete:
      operationId: delete_trigger_handler
      parameters:
      - description: Trigger ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Trigger deleted
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Invalid ID format
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Trigger not found
      tags:
      - super::trigger_api::handlers::query
    get:
      operationId: get_trigger_handler
      parameters:
      - description: Trigger ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerView'
          description: Trigger found
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Invalid ID format
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Trigger not found
      summary: |-
        GET /api/v1/triggers/{id}
        # Errors
        This handler does not currently return `Err(ApiError)` directly; invalid identifiers, missing
        triggers, and serialization failures are converted into HTTP responses.
      tags:
      - super::trigger_api::handlers::query
    put:
      operationId: update_trigger_handler
      parameters:
      - description: Trigger ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerUpdateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerView'
          description: Trigger updated
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Validation error or invalid request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Trigger not found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerErrorResponse'
          description: Version conflict
      summary: |-
        Handler for `PUT /api/v1/triggers/{id}`.
        # Errors
        This handler does not currently return `Err(ApiError)` directly; request validation, trigger
        update, and serialization failures are converted into HTTP responses.
      tags:
      - super::trigger_api::handlers::command
  /health:
    get:
      operationId: health_handler
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Service is healthy
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Service is unhealthy
      summary: Health check handler
      tags:
      - super::handlers::system
  /jobs:
    get:
      operationId: list_jobs_handler
      parameters:
      - description: Page number
        in: query
        name: page
        required: false
        schema:
          type: string
      - description: Page size
        in: query
        name: size
        required: false
        schema:
          type: string
      - description: Search query
        in: query
        name: q
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_JobSummary'
          description: Paginated jobs
      summary: |-
        GET /jobs
        # Errors
        Returns an error when the requested page of jobs cannot be loaded from the datastore.
      tags:
      - super::handlers::jobs::read
    post:
      operationId: create_job_handler
      parameters:
      - description: Whether to block until the job completes (true/false/blocking)
        in: query
        name: wait
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Job'
          application/x-yaml:
            schema:
              $ref: '#/components/schemas/Job'
          application/yaml:
            schema:
              $ref: '#/components/schemas/Job'
          text/yaml:
            schema:
              $ref: '#/components/schemas/Job'
        description: Job definition as JSON or YAML
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJobResponse'
          description: Job created or completed when wait=blocking
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Invalid job definition or unsupported content type
      summary: |-
        POST /jobs
        # Errors
        Returns an error when the request body cannot be parsed, the job fails validation, the
        datastore or broker operation fails, or the blocking wait path times out.
      tags:
      - super::handlers::jobs::create
  /jobs/{id}:
    get:
      operationId: get_job_handler
      parameters:
      - description: The job ID as either an RFC 4122 UUID or a 22-character base57 short ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/JobId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: Job found
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Job not found
      summary: |-
        GET /jobs/{id}
        # Errors
        Returns an error when the job cannot be loaded or its tasks cannot be fetched from the
        datastore.
      tags:
      - super::handlers::jobs::read
  /jobs/{id}/cancel:
    put:
      operationId: cancel_job_handler
      parameters:
      - description: The job ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/JobId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
          description: Job cancelled
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Job cannot be cancelled in its current state
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Job not found
      summary: |-
        PUT /jobs/{id}/cancel
        # Errors
        Returns an error when the job lookup or update fails, the broker publish fails, or the job
        cannot be cancelled in its current state.
      tags:
      - super::handlers::jobs::mutation
  /jobs/{id}/log:
    get:
      operationId: get_job_log_handler
      parameters:
      - description: The job ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/JobId'
      - description: Page number
        in: query
        name: page
        required: false
        schema:
          type: string
      - description: Page size
        in: query
        name: size
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_TaskLogPart'
          description: Paginated job log parts
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Job not found
      summary: |-
        GET /jobs/{id}/log
        # Errors
        Returns an error when the job cannot be loaded or the requested log page cannot be fetched.
      tags:
      - super::handlers::jobs::read
  /jobs/{id}/restart:
    put:
      operationId: restart_job_handler
      parameters:
      - description: The job ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/JobId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
          description: Job restarted
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Job cannot be restarted
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Job not found
      summary: |-
        PUT /jobs/{id}/restart
        # Errors
        Returns an error when the job lookup or update fails, the broker publish fails, or the job
        cannot be restarted from its current state.
      tags:
      - super::handlers::jobs::mutation
  /metrics:
    get:
      operationId: get_metrics_handler
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metrics'
          description: System metrics
      summary: |-
        GET /metrics
        # Errors
      tags:
      - super::handlers::system
  /nodes:
    get:
      operationId: list_nodes_handler
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Node'
                type: array
          description: List of active nodes
      summary: |-
        GET /nodes
        # Errors
      tags:
      - super::handlers::system
  /queues:
    get:
      description: '# Errors'
      operationId: list_queues_handler
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/QueueInfo'
                type: array
          description: List of queues
      summary: GET /queues
      tags:
      - super::handlers::queues
  /queues/{name}:
    delete:
      description: '# Errors'
      operationId: delete_queue_handler
      parameters:
      - description: Queue name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Queue deleted
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Queue not found
      summary: DELETE /queues/{name}
      tags:
      - super::handlers::queues
    get:
      description: '# Errors'
      operationId: get_queue_handler
      parameters:
      - description: Queue name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueInfo'
          description: Queue info
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Queue not found
      summary: GET /queues/{name}
      tags:
      - super::handlers::queues
  /scheduled-jobs:
    get:
      description: '# Errors'
      operationId: list_scheduled_jobs_handler
      responses:
        '200':
          description: List of scheduled jobs
      summary: GET /scheduled-jobs
      tags:
      - super::handlers::scheduled
    post:
      description: |-
        # Errors

        # Panics
        Panics if `sj.id` is `None`, which should never happen as `build_scheduled_job` always sets it.
      operationId: create_scheduled_job_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduledJobBody'
          application/x-yaml:
            schema:
              $ref: '#/components/schemas/CreateScheduledJobBody'
          application/yaml:
            schema:
              $ref: '#/components/schemas/CreateScheduledJobBody'
          text/yaml:
            schema:
              $ref: '#/components/schemas/CreateScheduledJobBody'
        description: Scheduled job definition as JSON or YAML
        required: true
      responses:
        '200':
          description: Scheduled job created
      summary: POST /scheduled-jobs
      tags:
      - super::handlers::scheduled
  /scheduled-jobs/{id}:
    delete:
      operationId: delete_scheduled_job_handler
      parameters:
      - description: Scheduled job ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/string'
      responses:
        '200':
          description: Scheduled job deleted
      tags:
      - super::handlers::scheduled
    get:
      operationId: get_scheduled_job_handler
      parameters:
      - description: Scheduled job ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/string'
      responses:
        '200':
          description: Scheduled job found
      tags:
      - super::handlers::scheduled
  /scheduled-jobs/{id}/pause:
    put:
      operationId: pause_scheduled_job_handler
      parameters:
      - description: Scheduled job ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/string'
      responses:
        '200':
          description: Scheduled job paused
      tags:
      - super::handlers::scheduled
  /scheduled-jobs/{id}/resume:
    put:
      operationId: resume_scheduled_job_handler
      parameters:
      - description: Scheduled job ID
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/string'
      responses:
        '200':
          description: Scheduled job resumed
      tags:
      - super::handlers::scheduled
  /tasks/{id}:
    get:
      operationId: get_task_handler
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Task details
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Task not found
      summary: |-
        GET /tasks/{id}
        # Errors
      tags:
      - super::handlers::tasks
  /tasks/{id}/log:
    get:
      operationId: get_task_log_handler
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: Page number
        in: query
        name: page
        required: false
        schema:
          type: string
      - description: Page size (max 100)
        in: query
        name: size
        required: false
        schema:
          type: string
      - description: Search query
        in: query
        name: q
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_TaskLogPart'
          description: Paginated task log entries
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Task not found
      summary: |-
        GET /tasks/{id}/log
        # Errors
      tags:
      - super::handlers::tasks
  /users:
    post:
      description: '# Errors'
      operationId: create_user_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserBody'
        required: true
      responses:
        '200':
          description: User created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: Missing username or password
      summary: POST /users
      tags:
      - super::handlers::system
