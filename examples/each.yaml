---
name: sample each job
tasks:
  - name: hello task
    image: ubuntu:mantic
    run: echo start of job 

  - name: sample each task
    each:
      list: "{{ sequence(1,5) }}"
      task:
        name: output task item
        var: eachTask{{item_index}}
        image: ubuntu:mantic
        env:
          ITEM: "{{item_value}}"
        run: echo -n $ITEM > $TWERK_OUTPUT

  - name: sample each task with custom var
    each:
      list: "{{ sequence(1,5) }}"
      var: "myitem"
      task:
        name: output task item
        var: eachTask{{myitem_index}}
        image: ubuntu:mantic
        env:
          ITEM: "{{myitem_value}}"
        run: echo -n $ITEM > $TWERK_OUTPUT

  - name: bye task
    image: ubuntu:mantic
    run: echo end of job
