[cli]
banner.mode = "console"

[client]
endpoint = "http://localhost:8000"

[logging]
level = "debug"
format = "pretty"

[broker]
type = "rabbitmq"

[broker.rabbitmq]
url = "amqp://guest:guest@localhost:5672/%2f"
consumer.timeout = "30m"
durable.queues = false
queue.type = "classic"

[datastore]
type = "postgres"

[datastore.postgres]
dsn = "postgres://twerk:twerk@localhost:5432/twerk?sslmode=disable"
max_open_conns = 25
max_idle_conns = 25
conn_max_lifetime = "1h"
conn_max_idle_time = "5m"

[coordinator]
address = "localhost:8000"
name = "Coordinator"

[coordinator.api]
endpoints.health = true
endpoints.jobs = true
endpoints.tasks = true
endpoints.nodes = true
endpoints.queues = true
endpoints.metrics = true
endpoints.users = true

[worker]
address = "localhost:8001"
name = "Worker"

[worker.queues]
default = 1

[runtime]
type = "shell"

[runtime.shell]
cmd = "bash,-c"
