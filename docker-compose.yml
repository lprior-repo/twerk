services:
  postgres:
    image: postgres:16-alpine
    container_name: twerk-postgres
    environment:
      POSTGRES_USER: tork
      POSTGRES_PASSWORD: tork
      POSTGRES_DB: tork
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tork -d tork"]
      interval: 2s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: twerk-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 20
