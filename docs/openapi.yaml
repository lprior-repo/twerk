          type:
          - object
          - 'null'
        error:
          type:
          - string
          - 'null'
        failedAt:
          format: date-time
          type:
          - string
          - 'null'
        files:
          additionalProperties:
            type: string
          propertyNames:
            type: string
          type:
          - object
          - 'null'
        gpus:
          type:
          - string
          - 'null'
        id:
          type: string
        if:
          type:
          - string
          - 'null'
        image:
          type:
          - string
          - 'null'
        jobId:
          type: string
        limits:
