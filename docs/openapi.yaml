                type:
                - string
                - 'null'
              state:
                $ref: '#/components/schemas/JobState'
              tags:
                items:
                  type: string
                type:
                - array
                - 'null'
              taskCount:
                format: int64
                type: integer
            type: object
          type: array
        number:
          description: Current page number
          format: int64
          type: integer
        size:
          description: Page size
          format: int64
          type: integer
        total_items:
          description: Total number of items
          format: int64
          type: integer
        total_pages:
          description: Total number of pages
          format: int64
          type: integer
      required:
      - items
      - number
      - size
      - total_pages
      - total_items
      type: object
    Page_TaskLogPart:
      description: Page represents a paginated result set
      properties:
        items:
          description: Items in the current page
