# cargo-mutants configuration
# See https://mutants.rs/ for documentation

# Run tests from the mutated package only (faster than full workspace)
# Use --test-package to override for specific runs
# test_package = ["twerk-common", "twerk-core", "twerk-infrastructure", "twerk-web", "twerk-app", "twerk-cli"]

# Exclude problematic files from mutation testing
exclude_globs = [
    "**/*tests*.rs",
    "**/tests/**",
    "**/fuzz/**",
    "**/proofs/**",
    "vendor/**",
    "**/*.pb.rs",
    "**/domain_types.rs",
    "crates/twerk-app/src/engine/engine.rs",
    "crates/twerk-app/src/engine/lifecycle.rs",
    "crates/twerk-infrastructure/src/runtime/docker/*.rs",
    "crates/twerk-infrastructure/src/runtime/podman/*.rs",
    "crates/twerk-infrastructure/src/datastore/postgres/impl_*.rs",
    "crates/twerk-infrastructure/src/broker/rabbitmq/*.rs",
    "crates/twerk-infrastructure/src/worker/worker_impl.rs",
    "crates/twerk-cli/src/main.rs",
    "crates/twerk-openapi-gen/**",
]

# Output directory
output = "mutants.out"

# Skip common utility functions that don't benefit from mutation testing
skip_calls = [
    "with_capacity",
    "new",
    "default",
]
