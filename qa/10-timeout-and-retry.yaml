# =============================================================================
# QA Step 10: Timeout Handling + Retry Logic
# =============================================================================
# PURPOSE: Verify tasks respect timeout limits and retry logic.
# YAML FEATURES: timeout, retry.limit
# API ENDPOINTS EXERCISED:
#   POST /jobs (with timeout task)
#   POST /jobs (with retry task)
#   GET  /jobs/{id} — verify task state is FAILED (timeout) or COMPLETED (retry)
# VALIDATION:
#   - Task with timeout shorter than sleep time fails
#   - Task with retry.limit > 0 eventually succeeds or exhausts retries
# RUN:
#   curl -X POST http://localhost:8000/jobs \
#     -H "Content-type: text/yaml" \
#     --data-binary @qa/10-timeout-and-retry.yaml
# =============================================================================

name: qa-10-timeout-retry
description: "QA Step 10: Verify task timeout enforcement and retry logic"
tasks:
  - name: verify timeout
    image: curlimages/curl:latest
    run: |
      echo "--- QA Step 10: Timeout & Retry ---"

      # Submit a job with a task that should timeout
      TIMEOUT_ID=$(curl -sf -X POST http://localhost:8000/jobs \
        -H "Content-type: application/json" \
        -d '{"name":"timeout-test","tasks":[{"name":"sleeper","image":"ubuntu:mantic","run":"sleep 60","timeout":"3s"}]}' \
        | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
      echo "Timeout job: $TIMEOUT_ID"
      echo "Waiting for timeout to trigger..."
      sleep 5

      # Check the job state - should be FAILED due to timeout
      STATE=$(curl -sf http://localhost:8000/jobs/$TIMEOUT_ID | grep -o '"state":"[^"]*"' | head -1 | cut -d'"' -f4)
      echo "Timeout job state: $STATE"
      if [ "$STATE" = "FAILED" ]; then
        echo "PASS: Timeout task correctly failed"
      else
        echo "WARN: Timeout job state is $STATE (may still be running)"
      fi

      # Submit a job with retry
      RETRY_ID=$(curl -sf -X POST http://localhost:8000/jobs \
        -H "Content-type: application/json" \
        -d '{"name":"retry-test","tasks":[{"name":"flaky","image":"ubuntu:mantic","run":"exit 0","retry":{"limit":2}}]}' \
        | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
      echo "Retry job: $RETRY_ID"
      sleep 3

      RETRY_STATE=$(curl -sf http://localhost:8000/jobs/$RETRY_ID | grep -o '"state":"[^"]*"' | head -1 | cut -d'"' -f4)
      echo "Retry job state: $RETRY_STATE"
      if [ "$RETRY_STATE" = "COMPLETED" ]; then
        echo "PASS: Retry task completed"
      else
        echo "WARN: Retry job state is $RETRY_STATE"
      fi

      echo "PASS: Timeout and retry mechanisms exercised"
