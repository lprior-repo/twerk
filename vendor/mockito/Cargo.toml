[package]
edition = "2021"
rust-version = "1.70"
name = "mockito"
version = "1.7.2"
authors = ["Florin Lipan <florinlipan@gmail.com>"]
build = false
exclude = [
    "/.appveyor.yml",
    "/.travis.yml",
    "/benchmarks.txt",
    "/docs/",
    "/slides.pdf",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "HTTP mocking for Rust."
homepage = "https://github.com/lipanski/mockito"
documentation = "https://docs.rs/mockito"
readme = "README.md"
keywords = [
    "mock",
    "mocks",
    "http",
    "webmock",
    "webmocks",
]
categories = [
    "development-tools::testing",
    "web-programming",
]
license = "MIT"
repository = "https://github.com/lipanski/mockito"

[badges.appveyor]
branch = "master"
repository = "lipanski/mockito"
service = "github"

[badges.travis-ci]
branch = "master"
repository = "lipanski/mockito"

[features]
color = ["colored"]
default = [
    "color",
    "parking_lot",
]
parking_lot = ["tokio/parking_lot"]

[lib]
name = "mockito"
path = "src/lib.rs"

[[example]]
name = "mockito-server"
path = "examples/mockito-server.rs"

[[test]]
name = "lib"
path = "tests/lib.rs"

[[bench]]
name = "lib"
path = "benches/lib.rs"

[dependencies.assert-json-diff]
version = "2.0"

[dependencies.bytes]
version = "1"

[dependencies.colored]
version = ">=2.0, <=3"
optional = true

[dependencies.futures-core]
version = "0.3"

[dependencies.http]
version = "1"

[dependencies.http-body]
version = "1"

[dependencies.http-body-util]
version = "0.1"

[dependencies.hyper]
version = "1"

[dependencies.hyper-util]
version = "0.1"
features = [
    "server-auto",
    "tokio",
]

[dependencies.log]
version = "0.4"

[dependencies.pin-project-lite]
version = "0.2"

[dependencies.rand]
version = "0.9"

[dependencies.regex]
version = "1.7"

[dependencies.serde_json]
version = "1.0"

[dependencies.serde_urlencoded]
version = "0.7"

[dependencies.similar]
version = "2.2"

[dependencies.tokio]
version = "1.25"
features = [
    "net",
    "rt",
    "sync",
]

[dev-dependencies.env_logger]
version = "0.8"

